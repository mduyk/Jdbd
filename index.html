<script>
    (function() {
        const kill = () => {
            document.body.innerHTML = "<div style='height:100vh;background:#000;color:#ef4444;display:flex;justify-content:center;align-items:center;text-align:center;padding:20px;font-family:Orbitron;'><div><h1>SECURITY BREACH</h1><p>Hệ thống đã tự hủy mã nguồn để bảo mật!ĐỊT MẸ MÀY</p><p style='color:#64748b'>F12 đã bị vô hiệu hóa. Vui lòng tắt và mở lại link.</p></div></div>";
            sessionStorage.setItem('m_lock', '1');
            window.stop();
        };
        if(sessionStorage.getItem('m_lock')) sessionStorage.removeItem('m_lock');
        window.addEventListener('keydown', (e) => {
            const isPC = !/Android|iPhone|iPad/i.test(navigator.userAgent);
            if(isPC) {
                if(e.key === 'F12' || (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key)) || (e.ctrlKey && e.key === 'u')) { e.preventDefault(); kill(); }
            }
        });
        setInterval(() => {
            const isPC = !/Android|iPhone|iPad/i.test(navigator.userAgent);
            if(isPC) {
                const threshold = 160;
                if(window.outerWidth - window.innerWidth > threshold || window.outerHeight - window.innerHeight > threshold) kill();
            }
        }, 1000);
    })();

    const ST = Date.now();
    setInterval(() => {
        const s = Math.floor((Date.now() - ST) / 1000);
        const h = Math.floor(s / 3600).toString().padStart(2, '0');
        const m = Math.floor((s % 3600) / 60).toString().padStart(2, '0');
        const sc = (s % 60).toString().padStart(2, '0');
        const el = document.getElementById('runtime');
        if(el) el.innerText = `${h}:${m}:${sc}`;
    }, 1000);

    window.onload = () => {
        setTimeout(() => {
            document.getElementById('splash-screen').style.display = 'none';
            document.getElementById('authPage').style.display = 'flex';
        }, 2000);
    };

    function register() {
        const u = document.getElementById("regUser").value.trim();
        const p = document.getElementById("regPass").value.trim();
        if(!u || !p) return alert("điền cho đúng vào k đúng thì thôi-)");
        localStorage.setItem("m_user", u);
        localStorage.setItem("m_pass", p);
        alert("Đăng ký thành công! cút vào đi e");
    }

    function login() {
        const u = document.getElementById("logUser").value.trim();
        const p = document.getElementById("logPass").value.trim();
        if(u === localStorage.getItem("m_user") && p === localStorage.getItem("m_pass") && u !== "") {
            document.getElementById("authPage").style.display = "none";
            document.getElementById("main").style.display = "block";
            loadHistory();
        } else alert("m có bt nhập không hay chx đăng ký?");
    }

        document.getElementById("btnProxy").className = (t === "proxy") ? "active" : "";
        document.getElementById("btnKc").className = (t === "kc") ? "active" : "";
    }

    let cI = "";
    function openPay(n, p) {
        cI = n + " (" + p + ")";
        document.getElementById("product").innerText = cI;
        document.getElementById("pay").style.display = "flex";
        const ns = ["⚠ Nhập đúng ID game vào nội dung chuyển khoản", "⚠ ghi đúng cái id vào ghi chú bank sai id quên ghi vào ghi chú thì tự chịu k hoàn ", "⚠ GHI cái ID vào ghi chú bank đó k là mất tiền tự chịu", "⚠ nhập cái id vào cái ghi chú bank đó r t duyệt cho"];
        document.getElementById("randomNote").innerText = ns[Math.floor(Math.random() * ns.length)];
    }

    function closePay() { document.getElementById("pay").style.display = "none"; document.getElementById("gameID").value = ""; }

    function confirmPay() {
        const id = document.getElementById("gameID").value.trim();
        if(!id) return alert("Nhập ID game!");
        const h = JSON.parse(localStorage.getItem("m_hist") || "[]");
        h.unshift({ product: cI, id: id, time: new Date().toLocaleString("vi-VN") });
        localStorage.setItem("m_hist", JSON.stringify(h));
        closePay(); loadHistory();
        setTimeout(() => {
            alert("Đã ghi nhận! Proxy nhắn Zalo Admin, KC đợi 10 phút.");
            window.location.href = "https://zalo.me/0328033706";
        }, 500);
    }

    function loadHistory() {
        const h = JSON.parse(localStorage.getItem("m_hist") || "[]");
        const b = document.getElementById("historyBox");
        if(!b) return;
        b.innerHTML = h.length ? h.map(i => `<div class="item"><b style="color:var(--primary)">${i.product}</b><br>ID Game: ${i.id}<br><small style="color:#64748b">${i.time} - <span style="color:#fbbf24">Đang xử lý</span></small></div>`).join("") : `<p style="color:#64748b; text-align:center; font-size:13px;">mua hàng ngay cho taooo.</p>`;
